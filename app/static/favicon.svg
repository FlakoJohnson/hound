<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <!-- hound favicon — lime-green + purple palette (matches tool branding) -->
  <rect width="64" height="64" rx="14" fill="#16161f"/>
  <!-- long droopy hound ears (purple), drawn behind the face -->
  <path d="M23 19 C6 21 3 43 15 50 C20 47 23 34 25 23 Z" fill="#af5fff"/>
  <path d="M41 19 C58 21 61 43 49 50 C44 47 41 34 39 23 Z" fill="#af5fff"/>
  <!-- head / face (lime) -->
  <path d="M32 14 C43 14 47 23 47 34 C47 47 40 53 32 53 C24 53 17 47 17 34 C17 23 21 14 32 14 Z" fill="#5fff00"/>
  <!-- eyes -->
  <circle cx="25.5" cy="31" r="3.1" fill="#16161f"/>
  <circle cx="38.5" cy="31" r="3.1" fill="#16161f"/>
  <!-- snout + nose -->
  <ellipse cx="32" cy="45" rx="7.5" ry="5.5" fill="#46b800"/>
  <ellipse cx="32" cy="43" rx="3.4" ry="2.6" fill="#16161f"/>
</svg>
