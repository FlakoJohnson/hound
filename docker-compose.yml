version: '3.9'

services:

  neo4j:
    image: neo4j:5.20-community
    container_name: hound-neo4j
    restart: unless-stopped
    environment:
      - NEO4J_AUTH=neo4j/${NEO4J_PASS:-bloodhound}
      - NEO4J_server_memory_heap_initial__size=512m
      - NEO4J_server_memory_heap_max__size=2G
      - NEO4J_server_memory_pagecache_size=512m
      - NEO4J_PLUGINS=["apoc"]
      - NEO4J_dbms_security_procedures_unrestricted=apoc.algo.*,apoc.path.*,apoc.coll.*,apoc.map.*,apoc.text.*
    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs
    ports:
      - "127.0.0.1:7474:7474"
      - "127.0.0.1:7687:7687"
    healthcheck:
      test: ["CMD", "neo4j", "status"]
      interval: 10s
      timeout: 10s
      retries: 20
      start_period: 30s

  hound:
    build: .
    container_name: hound-app
    restart: unless-stopped
    environment:
      - NEO4J_URI=bolt://neo4j:7687
      - NEO4J_USER=neo4j
      - NEO4J_PASS=${NEO4J_PASS:-bloodhound}
      - HOUND_TOKEN=${HOUND_TOKEN:-}
      - HOUND_USER=${HOUND_USER:-admin}
      - HOUND_PASS=${HOUND_PASS:-}
      - SECRET_KEY=${SECRET_KEY:-}
    ports:
      - "8080:5000"
    depends_on:
      neo4j:
        condition: service_healthy
    volumes:
      - ./data:/data

volumes:
  neo4j_data:
    external: true
    name: bh-query-engine_neo4j_data
  neo4j_logs:
    external: true
    name: bh-query-engine_neo4j_logs
